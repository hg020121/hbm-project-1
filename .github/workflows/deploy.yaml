name: Build and Deploy to EKS via Harbor

on:
  push:
    branches:
      - master

env:
  APP_NAME: sk054-hbm-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
      HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}

      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

      EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
      K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set image metadata
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          IMAGE_TAG=${GITHUB_RUN_NUMBER}-${SHORT_SHA}
          IMAGE_REPO=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${APP_NAME}
          FULL_IMAGE=${IMAGE_REPO}:${IMAGE_TAG}

          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "IMAGE_REPO=${IMAGE_REPO}" >> $GITHUB_ENV
          echo "FULL_IMAGE=${FULL_IMAGE}" >> $GITHUB_ENV

      - name: Build application
        run: |
          echo "build complete"

      - name: Log in to Harbor
        run: |
          echo "${HARBOR_PASSWORD}" | docker login ${HARBOR_REGISTRY} -u "${HARBOR_USERNAME}" --password-stdin

      - name: Build Docker image
        run: |
          docker build --platform linux/amd64 -f api/Dockerfile -t ${FULL_IMAGE} .

      - name: Push Docker image to Harbor
        run: |
          docker push ${FULL_IMAGE}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${AWS_REGION} \
            --name ${EKS_CLUSTER_NAME}

      - name: Deploy to EKS
        run: |
          kubectl set image deployment/sk054-hbm-api \
            hbm-api=${FULL_IMAGE} \
            -n ${K8S_NAMESPACE}
          kubectl rollout status deployment/sk054-hbm-api \
            -n ${K8S_NAMESPACE} --timeout=300s

      - name: Check status
        run: |
          kubectl get pods -n ${K8S_NAMESPACE} | grep sk054-hbm-api
          kubectl get svc -n ${K8S_NAMESPACE} | grep sk054

      - name: Logout Harbor
        if: always()
        run: |
          docker logout ${HARBOR_REGISTRY} || true
